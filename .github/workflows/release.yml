name: Release

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v4
        with:
          release-type: simple
# This workflow creates the tag, changelog, and GitHub Release. Publishing is
# deliberately separate in publish.yml and starts only on release: published.
