name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - run: npm run perf:smoke
      - run: npm run build

  ux-gallery:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      # Capture screenshots for all UX states × themes × viewports.
      # The spec itself enforces completeness (fails if any matrix entry is missing).
      - run: npx playwright test tests/e2e/ux-gallery.e2e.test.ts
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
      # Generate the self-contained HTML gallery from the captured screenshots.
      - run: npx tsx scripts/generate-ux-gallery-html.ts
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
      # Upload screenshots + gallery HTML as a downloadable CI artifact.
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ux-gallery
          path: ux-gallery-screenshots/
          retention-days: 30
