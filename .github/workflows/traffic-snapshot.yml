name: Traffic snapshot

# Appends a dated GitHub repo-traffic snapshot to docs/metrics/traffic-history.json.
# Server-side only: reads the repo traffic API. This is NOT user telemetry — the
# shipped site adds no analytics.
#
# Activation: the ephemeral Actions GITHUB_TOKEN cannot read the repo traffic API
# (HTTP 403 "Resource not accessible by integration"). To collect live data, add a
# repository secret named TRAFFIC_TOKEN holding a PAT with traffic (push) access.
# Without it, this workflow runs green and simply skips collection.

on:
  workflow_dispatch: {}
  schedule:
    - cron: "17 6 * * 1" # every Monday 06:17 UTC

permissions:
  contents: write

concurrency:
  group: traffic-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Collect traffic snapshot
        env:
          GH_TOKEN: ${{ secrets.TRAFFIC_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          mkdir -p docs/metrics
          if [ ! -f docs/metrics/traffic-history.json ]; then
            echo '{"schema":"sanger-viewer traffic history; server-side GitHub repo traffic API; no user telemetry","snapshots":[]}' > docs/metrics/traffic-history.json
          fi
          if ! views=$(gh api "repos/${{ github.repository }}/traffic/views" 2>/dev/null); then
            echo "::notice::Traffic API not accessible with the current token. Add a repo secret TRAFFIC_TOKEN (a PAT with traffic/push access) to enable live collection. Skipping this run."
            exit 0
          fi
          clones=$(gh api "repos/${{ github.repository }}/traffic/clones" 2>/dev/null || echo '{"count":0,"uniques":0}')
          now=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          entry=$(jq -n --arg now "$now" --argjson v "$views" --argjson c "$clones" \
            '{date:$now, views:{count:($v.count // 0), uniques:($v.uniques // 0)}, clones:{count:($c.count // 0), uniques:($c.uniques // 0)}}')
          jq --argjson e "$entry" '.snapshots += [$e]' docs/metrics/traffic-history.json > docs/metrics/traffic-history.tmp.json
          mv docs/metrics/traffic-history.tmp.json docs/metrics/traffic-history.json
          echo "SNAPSHOT_TAKEN=1" >> "$GITHUB_ENV"

      - name: Commit snapshot
        if: env.SNAPSHOT_TAKEN == '1'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/metrics/traffic-history.json
          if git diff --cached --quiet; then
            echo "No traffic change to commit."
          else
            git commit -m "chore(metrics): weekly traffic snapshot"
            git push
          fi
