name: Copilot Setup Steps

# Runs in the GitHub Copilot coding agent's ephemeral environment to pre-install
# dependencies so the agent can build, lint, test, and typecheck. Invoked by the
# agent (workflow_dispatch); it is not part of push/PR CI.
on:
  workflow_dispatch: {}

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
