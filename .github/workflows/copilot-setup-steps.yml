on:
  workflow_dispatch: {}
jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/setup-node@1e60f620b9541d5f5f3af2d1f2b0b9839c4e53c0 # v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
