name: Bug report
description: Report a reproducible problem with sanger-viewer
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve sanger-viewer. Trace data is processed only in your browser.
        Before attaching a file, remove confidential sample names and metadata. A minimal synthetic
        or otherwise safe-to-share trace is preferred.
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the actions that reliably trigger the problem.
      placeholder: |
        1. Open the viewer
        2. Load…
        3. Select…
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include any visible error message.
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and version
      placeholder: Firefox 128, Chrome 126, Safari 17.5
    validations:
      required: true
  - type: input
    id: operating-system
    attributes:
      label: Operating system
      placeholder: Windows 11, macOS 14, Ubuntu 24.04
    validations:
      required: true
  - type: textarea
    id: trace
    attributes:
      label: Redacted or sample trace
      description: Drag in a minimal, non-confidential .ab1 or .scf file, or link to a public sample. Do not attach sensitive trace data.
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I confirm that anything attached to this public issue is safe to share.
          required: true
